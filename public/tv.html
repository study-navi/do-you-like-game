<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クラスランキング - Do you like ...? ゲーム</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
    background: #1B1A2E; color: #FFFFFF; margin: 0; padding: 40px;
  }
  .title { font-size: 42px; font-weight: 700; text-align: center; margin-bottom: 30px; letter-spacing: 1px; }
  .board { display: flex; flex-direction: column; gap: 14px; max-width: 1000px; margin: 0 auto; }
  .row {
    display: flex; align-items: center; gap: 22px; background: #26254A;
    border-radius: 20px; padding: 16px 28px;
  }
  .row.top1 { background: linear-gradient(90deg, #4A3F1E, #26254A); border: 2px solid #F6C453; }
  .row.flash { animation: flash 0.9s ease-out; }
  @keyframes flash { 0% { background: #F6C453; } 100% { background: #26254A; } }
  .rank { font-size: 34px; font-weight: 700; width: 76px; text-align: center; color: #F6C453; }
  .avatar { width: 104px; height: 78px; border-radius: 10px; object-fit: cover; border: 3px solid #F6C453; flex: 0 0 auto; }
  .avatar-blank {
    width: 104px; height: 78px; border-radius: 10px; background: #3D3B6B; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center; font-size: 26px; color: #B7B4E0;
  }
  .meta { flex: 1; }
  .streak { font-size: 16px; color: #B7B4E0; }
  .status { font-size: 13px; color: #7D7AAE; margin-top: 4px; }
  .score { font-size: 36px; font-weight: 700; color: #F6C453; white-space: nowrap; }
  .score .unit { font-size: 16px; font-weight: 500; }
  .empty { text-align: center; font-size: 22px; color: #B7B4E0; margin-top: 80px; }
  .room-tag { text-align: center; font-size: 16px; color: #B7B4E0; margin-top: -14px; margin-bottom: 24px; }
  .room-overlay {
    position: fixed; inset: 0; background: rgba(10,10,20,0.75);
    display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 100;
  }
  .room-card { background: #26254A; border-radius: 20px; padding: 28px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
  .room-title { font-size: 20px; font-weight: 700; margin-bottom: 10px; color: #FFFFFF; }
  .room-sub { font-size: 14px; color: #B7B4E0; margin-bottom: 16px; }
  .room-input { width: 100%; padding: 12px; border-radius: 10px; border: none; font-size: 18px; box-sizing: border-box; text-align: center; margin-bottom: 14px; }
  .room-start-btn { width: 100%; padding: 12px; border-radius: 999px; border: none; background: #F6C453; color: #26254A; font-weight: 700; font-size: 16px; }
</style>
</head>
<body>
  <div id="room-overlay" class="room-overlay">
    <div class="room-card">
      <div class="room-title">教室コードを入力してください</div>
      <div class="room-sub">生徒に配ったURLと同じコードを入れてください（例: 3-1）</div>
      <input type="text" id="room-code-input" class="room-input" placeholder="れい: 3-1">
      <button id="room-code-btn" class="room-start-btn">はじめる</button>
    </div>
  </div>
  <div class="title">🏆 クラスランキング</div>
  <div class="room-tag" id="room-tag"></div>
  <div class="board" id="board"></div>
  <div class="empty" id="empty" style="display:none;">まだ誰も参加していません</div>

<script>
var prevScores = {};
var ROOM_KEY = "doyoulike_tv_room";
var currentRoom = "";
var pollTimer = null;

function getRoomFromUrl(){
  var m = location.search.match(/[?&]room=([^&]+)/);
  return m ? decodeURIComponent(m[1]) : "";
}
function startWithRoom(room){
  currentRoom = room;
  localStorage.setItem(ROOM_KEY, room);
  var url = new URL(location.href);
  url.searchParams.set("room", room);
  history.replaceState(null, "", url.toString());
  document.getElementById("room-tag").textContent = "教室コード: " + room;
  document.getElementById("room-overlay").style.display = "none";
  if(pollTimer) clearTimeout(pollTimer);
  poll();
}
document.getElementById("room-code-btn").onclick = function(){
  var v = document.getElementById("room-code-input").value.trim();
  if(!v) return;
  startWithRoom(v);
};

function render(students){
  var board = document.getElementById("board");
  document.getElementById("empty").style.display = students.length ? "none" : "block";
  board.innerHTML = "";
  students.forEach(function(s, idx){
    var rankLabel = idx < 3 ? ["🥇","🥈","🥉"][idx] : ("#" + (idx + 1));
    var row = document.createElement("div");
    var cls = "row" + (idx === 0 ? " top1" : "");
    if(prevScores[s.id] !== undefined && s.score > prevScores[s.id]) cls += " flash";
    row.className = cls;
    row.innerHTML =
      '<div class="rank">' + rankLabel + '</div>' +
      (s.photo ? '<img class="avatar" src="' + s.photo + '">' : '<div class="avatar-blank">?</div>') +
      '<div class="meta">' +
        '<div class="streak">🔥 ' + s.streak + ' れんぞく（さいこう ' + s.best + '）</div>' +
        '<div class="status">' + (s.status || "") + '</div>' +
      '</div>' +
      '<div class="score">' + s.score + '<span class="unit"> pt</span></div>';
    board.appendChild(row);
    prevScores[s.id] = s.score;
  });
}

function poll(){
  fetch("/api/state?room=" + encodeURIComponent(currentRoom))
    .then(function(r){ return r.json(); })
    .then(function(d){ render(d.students); })
    .catch(function(){})
    .finally(function(){ pollTimer = setTimeout(poll, 2000); });
}

(function boot(){
  var urlRoom = getRoomFromUrl();
  var savedRoom = localStorage.getItem(ROOM_KEY) || "";
  if(urlRoom){
    startWithRoom(urlRoom);
  } else if(savedRoom){
    startWithRoom(savedRoom);
  } else {
    document.getElementById("room-overlay").style.display = "flex";
  }
})();
</script>
</body>
</html>
