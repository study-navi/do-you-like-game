<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do you like ...? ゲーム</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.1.0/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
    background: #F1EFE8;
    color: #2C2C2A;
    margin: 0;
    padding: 16px;
    display: flex;
    justify-content: center;
  }
  .app {
    width: 100%;
    max-width: 720px;
    background: #FFFFFF;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    position: relative;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .title-row { display: flex; align-items: center; gap: 10px; }
  .my-avatar { width: 52px; height: 39px; border-radius: 8px; object-fit: cover; border: 2px solid #185FA5; display: none; }
  .title { font-size: 22px; font-weight: 600; }
  .pills-wrap { display: flex; gap: 10px; flex-wrap: wrap; }
  .score-pill {
    display: flex; align-items: center; gap: 8px;
    background: #FAEEDA; border-radius: 999px; padding: 8px 18px;
  }
  .score-pill i { font-size: 20px; color: #854F0B; }
  #score { font-size: 24px; font-weight: 600; color: #854F0B; }
  .score-lbl { font-size: 14px; color: #854F0B; }
  .streak-pill {
    display: flex; align-items: center; gap: 8px;
    background: #FDEDEA; border-radius: 999px; padding: 8px 18px;
  }
  .streak-pill i { font-size: 20px; color: #C2410C; }
  #streak { font-size: 24px; font-weight: 600; color: #C2410C; }
  .streak-lbl { font-size: 14px; color: #C2410C; }
  .step-label { font-size: 16px; color: #5F5E5A; margin-bottom: 14px; display: flex; align-items: center; }
  .num {
    background: #E6F1FB; color: #185FA5; border-radius: 999px;
    padding: 3px 12px; font-size: 14px; margin-right: 10px; font-weight: 500;
  }
  button { font-family: inherit; cursor: pointer; }
  .rand-btn {
    font-size: 16px; padding: 10px 20px; border-radius: 999px;
    border: 2px solid #7F77DD; color: #534AB7; background: #EEEDFE; font-weight: 500;
    transition: transform 0.1s;
  }
  .rand-btn:active { transform: scale(0.96); }
  .top-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .cat-tabs { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 14px; padding-bottom: 3px; -webkit-overflow-scrolling: touch; }
  .cat-tab {
    flex: 0 0 auto; display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 999px; border: 1px solid #D3D1C7;
    background: #FFFFFF; font-size: 14px; color: #5F5E5A; font-weight: 500;
    transition: background 0.1s, color 0.1s, border-color 0.1s;
  }
  .cat-tab i { font-size: 16px; }
  .cat-tab.active { background: #185FA5; border-color: #185FA5; color: #FFFFFF; }
  .progress-wrap { margin-bottom: 14px; }
  .progress-bar-bg { background: #EDEBE3; border-radius: 999px; height: 8px; overflow: hidden; }
  .progress-bar-fill { background: #378ADD; height: 100%; border-radius: 999px; transition: width 0.3s; width: 0%; }
  .progress-text { font-size: 12px; color: #888780; margin-top: 6px; text-align: right; }
  #cards {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px;
  }
  .card {
    position: relative;
    padding: 14px 6px; border-radius: 14px; display: flex; flex-direction: column;
    align-items: center; gap: 5px; background: #FFFFFF; border: 1px solid #D3D1C7;
    transition: background 0.1s, transform 0.1s, opacity 0.1s;
  }
  .card:active { transform: scale(0.96); }
  .card:hover { background: #F1EFE8; }
  .card.used { opacity: 0.5; }
  .used-badge {
    position: absolute; top: 6px; right: 6px; width: 18px; height: 18px;
    border-radius: 50%; background: #1D9E75; color: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 11px;
  }
  .card-icon { font-size: 30px; color: #185FA5; }
  .swatch { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #B4B2A9; display: inline-block; }
  .card-en { font-size: 15px; font-weight: 600; }
  .card-ja { font-size: 12px; color: #888780; }
  .chosen { text-align: center; margin-bottom: 20px; }
  .chosen-en { font-size: 26px; font-weight: 600; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .chosen-ja { font-size: 14px; color: #888780; }
  .yn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .btn-yes, .btn-no {
    padding: 22px; font-size: 20px; border-radius: 16px; font-weight: 600;
    transition: transform 0.1s;
  }
  .btn-yes { border: 2px solid #1D9E75; color: #0F6E56; background: #E1F5EE; }
  .btn-no { border: 2px solid #D85A30; color: #993C1D; background: #FAECE7; }
  .btn-yes:active, .btn-no:active { transform: scale(0.97); }
  .btn-yes i, .btn-no i { font-size: 26px; vertical-align: -5px; margin-right: 8px; }
  .btn-sub { font-size: 14px; margin-top: 5px; font-weight: 400; }
  .question-box { background: #F1EFE8; border-radius: 16px; padding: 28px 20px; text-align: center; margin-bottom: 10px; }
  .q-hint { font-size: 14px; color: #888780; margin-bottom: 10px; }
  #question { font-size: 28px; font-weight: 600; line-height: 1.4; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 6px; }
  #question .hl { color: #185FA5; }
  #prediction-badge { margin-top: 14px; font-size: 15px; color: #5F5E5A; }
  .result-box { border-radius: 16px; padding: 32px 20px; margin-bottom: 18px; text-align: center; }
  .result-box i { font-size: 48px; }
  .result-title { font-size: 28px; font-weight: 600; margin: 10px 0 6px; }
  .result-sub { font-size: 17px; }
  .streak-msg { margin-top: 12px; font-size: 15px; color: #C2410C; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .next-btn {
    padding: 14px 36px; font-size: 17px; border-radius: 999px; font-weight: 500;
    border: 1px solid #888780; background: #FFFFFF; color: #2C2C2A; transition: transform 0.1s;
  }
  .next-btn:active { transform: scale(0.97); }
  .next-btn i { font-size: 19px; vertical-align: -3px; margin-right: 6px; }
  .center { text-align: center; }
  .footer { margin-top: 22px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .reset-btn { font-size: 14px; padding: 8px 16px; color: #888780; background: none; border: none; }
  .reset-btn:hover { color: #5F5E5A; text-decoration: underline; }
  .retake-link { font-size: 13px; padding: 8px 16px; color: #888780; background: none; border: none; }
  .retake-link:hover { color: #5F5E5A; text-decoration: underline; }
  .mt16 { margin-top: 18px; }
  .speak-btn {
    border: none; background: #EEEDFE; color: #534AB7; width: 32px; height: 32px;
    border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
    font-size: 16px; line-height: 1; flex: 0 0 auto; transition: transform 0.1s;
  }
  .speak-btn:active { transform: scale(0.9); }

  /* ---- registration overlay ---- */
  .register-overlay {
    position: fixed; inset: 0; background: rgba(44,44,42,0.55);
    display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 100;
  }
  .register-card {
    background: #FFFFFF; border-radius: 20px; padding: 24px; width: 100%; max-width: 420px;
    text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.2);
  }
  .register-title { font-size: 18px; font-weight: 600; margin-bottom: 14px; }
  .register-sub { font-size: 13px; color: #888780; margin-bottom: 14px; }
  .reg-frame {
    width: 100%; aspect-ratio: 4 / 3; background: #F1EFE8; border-radius: 16px;
    overflow: hidden; margin-bottom: 16px; display: flex; align-items: center; justify-content: center;
  }
  .reg-frame video, .reg-frame img { width: 100%; height: 100%; object-fit: cover; }
  .register-actions { display: flex; flex-direction: column; gap: 10px; }
  .reg-btn-primary {
    padding: 14px; font-size: 16px; border-radius: 999px; font-weight: 600;
    border: 2px solid #7F77DD; color: #534AB7; background: #EEEDFE;
  }
  .reg-btn-confirm {
    padding: 14px; font-size: 16px; border-radius: 999px; font-weight: 600;
    border: 2px solid #1D9E75; color: #0F6E56; background: #E1F5EE;
  }
  .reg-btn-secondary {
    padding: 10px; font-size: 14px; border-radius: 999px; font-weight: 500;
    border: 1px solid #D3D1C7; color: #5F5E5A; background: #FFFFFF;
  }
  .reg-error { color: #993C1D; font-size: 13px; margin-top: 10px; min-height: 16px; }
  .reg-skip { margin-top: 14px; font-size: 12px; color: #B4B2A9; background: none; border: none; text-decoration: underline; }
</style>
</head>
<body>
<div class="app">

  <div id="register-overlay" class="register-overlay">
    <div class="register-card">
      <div class="register-title">📷 なまえカードを うつしてね</div>
      <div class="register-sub">紙に なまえを かいて、しゃしんを とってください</div>
      <div id="room-badge" style="font-size:13px;color:#185FA5;background:#E6F1FB;border-radius:999px;padding:6px 14px;margin-bottom:14px;display:none;"></div>
      <div id="room-row" style="margin-bottom:16px;display:none;text-align:left;">
        <label style="font-size:13px;color:#5F5E5A;display:block;margin-bottom:6px;">きょうしつコード（せんせいに きいてね）</label>
        <input type="text" id="room-input" placeholder="れい: 3-1" style="width:100%;padding:10px;border-radius:10px;border:1px solid #D3D1C7;font-size:15px;box-sizing:border-box;text-align:center;">
      </div>
      <div class="reg-frame" id="reg-frame">
        <div id="reg-placeholder" style="color:#B4B2A9;font-size:13px;padding:0 16px;text-align:center;">まだ しゃしんが ありません</div>
        <img id="reg-preview" style="display:none;">
      </div>
      <input type="file" id="reg-file-input" accept="image/*" capture="environment" style="display:none;" onchange="onPhotoSelected(event)">
      <div class="register-actions">
        <button id="reg-capture-btn" class="reg-btn-primary" onclick="document.getElementById('reg-file-input').click()">
          <i class="ti ti-camera" style="vertical-align:-3px;margin-right:6px;"></i>しゃしんを とる
        </button>
        <button id="reg-confirm-btn" class="reg-btn-confirm" style="display:none;" onclick="confirmPhoto()">これで OK</button>
        <button id="reg-retake-btn" class="reg-btn-secondary" style="display:none;" onclick="retakePhoto()">とりなおす</button>
      </div>
      <div class="reg-error" id="reg-error"></div>
      <button class="reg-skip" onclick="skipRegister()">せんせいを よばずに あそぶ（きろくは のこりません）</button>
    </div>
  </div>

  <div class="header">
    <div class="title-row">
      <img id="my-avatar" class="my-avatar" alt="">
      <div class="title">Do you like ...? ゲーム</div>
    </div>
    <div class="pills-wrap">
      <div class="score-pill">
        <i class="ti ti-star"></i>
        <span id="score">0</span>
        <span class="score-lbl">ポイント</span>
      </div>
      <div class="streak-pill" id="streak-pill" title="さいこう記録: 0れんぞく">
        <i class="ti ti-flame"></i>
        <span id="streak">0</span>
        <span class="streak-lbl">れんぞく</span>
      </div>
    </div>
  </div>

  <div id="step1">
    <div class="top-row">
      <div class="step-label"><span class="num">1</span>カードをえらぼう</div>
      <button id="rand-btn" class="rand-btn" onclick="randomPick()">
        <i class="ti ti-dice-5" style="font-size:18px;vertical-align:-3px;margin-right:6px;"></i>ランダムにえらぶ
      </button>
    </div>
    <div class="cat-tabs" id="cat-tabs"></div>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
      <div class="progress-text" id="progress-text"></div>
    </div>
    <div id="cards"></div>
  </div>

  <div id="step2" style="display:none;">
    <div class="step-label"><span class="num">2</span>友だちのこたえを よそうしよう</div>
    <div id="chosen1" class="chosen"></div>
    <div class="yn-grid">
      <button class="btn-yes" onclick="predict('yes')">
        <i class="ti ti-circle-check"></i>Yes, I do.<div class="btn-sub">すきだと思う</div>
      </button>
      <button class="btn-no" onclick="predict('no')">
        <i class="ti ti-circle-x"></i>No, I don't.<div class="btn-sub">すきじゃないと思う</div>
      </button>
    </div>
  </div>

  <div id="step3" style="display:none;">
    <div class="step-label"><span class="num">3</span>友だちに きいてみよう</div>
    <div class="question-box">
      <div class="q-hint">大きなこえで</div>
      <div id="question"></div>
      <div id="prediction-badge"></div>
    </div>
    <div class="step-label mt16">友だちのこたえは?</div>
    <div class="yn-grid">
      <button class="btn-yes" onclick="answer('yes')">Yes, I do.</button>
      <button class="btn-no" onclick="answer('no')">No, I don't.</button>
    </div>
  </div>

  <div id="step4" style="display:none;" class="center">
    <div id="result-box" class="result-box"></div>
    <button class="next-btn" onclick="reset()">
      <i class="ti ti-refresh"></i>つぎのカードへ
    </button>
  </div>

  <div class="footer">
    <button class="retake-link" onclick="reRegister()">べつのカードで とりなおす</button>
    <button class="reset-btn" onclick="resetAll()">スコア・記録を ぜんぶ 0にもどす</button>
  </div>
</div>

<script>
var items = [
  {en:"soccer", ja:"サッカー", icon:"ti-ball-football", category:"sports"},
  {en:"baseball", ja:"やきゅう", icon:"ti-ball-baseball", category:"sports"},
  {en:"basketball", ja:"バスケ", icon:"ti-ball-basketball", category:"sports"},
  {en:"volleyball", ja:"バレーボール", icon:"ti-ball-volleyball", category:"sports"},
  {en:"tennis", ja:"テニス", icon:"ti-ball-tennis", category:"sports"},
  {en:"swimming", ja:"すいえい", icon:"ti-swimming", category:"sports"},
  {en:"running", ja:"かけっこ", icon:"ti-run", category:"sports"},
  {en:"ice cream", ja:"アイスクリーム", icon:"ti-ice-cream", category:"food"},
  {en:"pudding", ja:"プリン", icon:"ti-cake", category:"food"},
  {en:"milk", ja:"ぎゅうにゅう", icon:"ti-milk", category:"food"},
  {en:"pizza", ja:"ピザ", icon:"ti-pizza", category:"food"},
  {en:"hamburgers", ja:"ハンバーガー", icon:"ti-burger", category:"food"},
  {en:"apples", ja:"りんご", icon:"ti-apple", category:"food"},
  {en:"tomatoes", ja:"トマト", icon:"ti-plant", category:"food"},
  {en:"carrots", ja:"にんじん", icon:"ti-carrot", category:"food"},
  {en:"lemons", ja:"レモン", icon:"ti-lemon", category:"food"},
  {en:"dogs", ja:"いぬ", icon:"ti-dog", category:"animal"},
  {en:"cats", ja:"ねこ", icon:"ti-cat", category:"animal"},
  {en:"music", ja:"おんがく", icon:"ti-music", category:"animal"},
  {en:"blue", ja:"あお", swatch:"#378ADD", category:"color"},
  {en:"light blue", ja:"みずいろ", swatch:"#8ECAE6", category:"color"},
  {en:"red", ja:"あか", swatch:"#E24B4A", category:"color"},
  {en:"green", ja:"みどり", swatch:"#639922", category:"color"},
  {en:"light green", ja:"きみどり", swatch:"#A9C23F", category:"color"},
  {en:"yellow", ja:"きいろ", swatch:"#FAC775", category:"color"},
  {en:"pink", ja:"ピンク", swatch:"#ED93B1", category:"color"},
  {en:"purple", ja:"むらさき", swatch:"#7F77DD", category:"color"},
  {en:"orange", ja:"オレンジ", swatch:"#EF9F27", category:"color"},
  {en:"black", ja:"くろ", swatch:"#2C2C2A", category:"color"},
  {en:"white", ja:"しろ", swatch:"#FFFFFF", category:"color"}
];

var categories = [
  {id:"all", label:"すべて", icon:"ti-apps"},
  {id:"sports", label:"スポーツ", icon:"ti-ball-football"},
  {id:"food", label:"たべもの", icon:"ti-pizza"},
  {id:"animal", label:"どうぶつ・おんがく", icon:"ti-dog"},
  {id:"color", label:"いろ", icon:"ti-palette"}
];

var STORAGE_KEY = "doyoulike_game_v1";
var STUDENT_ID_KEY = "doyoulike_student_id";
var STUDENT_PHOTO_KEY = "doyoulike_student_photo";

var score = 0, current = null, myPredict = null, spinning = false;
var streak = 0, best = 0;
var usedSet = new Set();
var currentCategory = "all";
var cardEls = [];
var filteredIndices = [];
var audioCtx = null;
var studentId = null;
var capturedPhoto = null;

var grid = document.getElementById("cards");

/* ---------- room code ---------- */
function getRoomFromUrl(){
  var m = location.search.match(/[?&]room=([^&]+)/);
  return m ? decodeURIComponent(m[1]) : "";
}
function getRoomForRegister(){
  var urlRoom = getRoomFromUrl();
  if(urlRoom) return urlRoom;
  var input = document.getElementById("room-input");
  return input ? input.value : "";
}

/* ---------- storage ---------- */
function loadState(){
  try{
    var raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      var d = JSON.parse(raw);
      score = d.score || 0;
      streak = d.streak || 0;
      best = d.best || 0;
      usedSet = new Set(d.used || []);
    }
  }catch(e){}
}
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      score: score, streak: streak, best: best, used: Array.from(usedSet)
    }));
  }catch(e){}
}

/* ---------- server sync (for teacher / TV view) ---------- */
function syncEvent(payload){
  if(!studentId) return;
  payload.id = studentId;
  fetch("/api/event", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(payload)
  }).catch(function(){});
}

/* ---------- registration ---------- */
function onPhotoSelected(event){
  var file = event.target.files && event.target.files[0];
  if(!file) return;
  var err = document.getElementById("reg-error");
  err.textContent = "";
  var reader = new FileReader();
  reader.onload = function(e){
    var img = new Image();
    img.onload = function(){
      var targetW = 320, targetH = 240; // 横長(4:3)にトリミング
      var canvas = document.createElement("canvas");
      canvas.width = targetW; canvas.height = targetH;
      var ctx = canvas.getContext("2d");
      var iw = img.width, ih = img.height;
      var imgAspect = iw / ih, targetAspect = targetW / targetH;
      var sx, sy, sw, sh;
      if(imgAspect > targetAspect){
        sh = ih; sw = ih * targetAspect; sx = (iw - sw) / 2; sy = 0;
      } else {
        sw = iw; sh = iw / targetAspect; sx = 0; sy = (ih - sh) / 2;
      }
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, targetW, targetH);
      capturedPhoto = canvas.toDataURL("image/jpeg", 0.75);

      document.getElementById("reg-preview").src = capturedPhoto;
      document.getElementById("reg-preview").style.display = "block";
      document.getElementById("reg-placeholder").style.display = "none";
      document.getElementById("reg-capture-btn").style.display = "none";
      document.getElementById("reg-confirm-btn").style.display = "block";
      document.getElementById("reg-retake-btn").style.display = "block";
    };
    img.onerror = function(){
      err.textContent = "しゃしんを よみこめませんでした。もう一度 おためしください。";
    };
    img.src = e.target.result;
  };
  reader.onerror = function(){
    err.textContent = "しゃしんを よみこめませんでした。もう一度 おためしください。";
  };
  reader.readAsDataURL(file);
}
function retakePhoto(){
  capturedPhoto = null;
  document.getElementById("reg-file-input").value = "";
  document.getElementById("reg-preview").style.display = "none";
  document.getElementById("reg-placeholder").style.display = "block";
  document.getElementById("reg-capture-btn").style.display = "block";
  document.getElementById("reg-confirm-btn").style.display = "none";
  document.getElementById("reg-retake-btn").style.display = "none";
}
function confirmPhoto(){
  if(!capturedPhoto) return;
  var err = document.getElementById("reg-error");
  err.textContent = "とうろく中...";
  fetch("/api/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ photo: capturedPhoto, total: items.length, room: getRoomForRegister() })
  }).then(function(r){ return r.json(); })
    .then(function(d){
      if(!d.id) throw new Error("no id");
      localStorage.setItem(STUDENT_ID_KEY, d.id);
      localStorage.setItem(STUDENT_PHOTO_KEY, capturedPhoto);
      studentId = d.id;
      finishRegister();
    })
    .catch(function(){
      err.textContent = "先生のサーバーに つなげませんでした。Wi-Fiを かくにんしてください。";
    });
}
function skipRegister(){
  studentId = null;
  finishRegister();
}
function finishRegister(){
  document.getElementById("register-overlay").style.display = "none";
  var photo = localStorage.getItem(STUDENT_PHOTO_KEY);
  if(photo){
    var av = document.getElementById("my-avatar");
    av.src = photo;
    av.style.display = "inline-block";
  }
  initGame();
}
function reRegister(){
  if(!confirm("なまえカードを とりなおしますか？")) return;
  localStorage.removeItem(STUDENT_ID_KEY);
  localStorage.removeItem(STUDENT_PHOTO_KEY);
  location.reload();
}

/* ---------- audio ---------- */
function ensureAudio(){
  if(!audioCtx){
    var AC = window.AudioContext || window.webkitAudioContext;
    if(AC) audioCtx = new AC();
  }
}
function beep(freq, dur, type){
  ensureAudio();
  if(!audioCtx) return;
  var o = audioCtx.createOscillator();
  var g = audioCtx.createGain();
  o.type = type || "sine";
  o.frequency.value = freq;
  o.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(0.16, audioCtx.currentTime);
  o.start();
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
  o.stop(audioCtx.currentTime + dur);
}
function playCorrect(){ beep(660, 0.12); setTimeout(function(){ beep(880, 0.18); }, 110); }
function playWrong(){ beep(200, 0.28); }

/* ---------- speech ---------- */
function speak(text){
  if(!("speechSynthesis" in window)) return;
  try{
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    u.rate = 0.9;
    window.speechSynthesis.speak(u);
  }catch(e){}
}
function speakCurrentWord(){ if(current) speak(current.en); }
function speakCurrentQuestion(){ if(current) speak("Do you like " + current.en + "?"); }

/* ---------- rendering ---------- */
function renderTabs(){
  var wrap = document.getElementById("cat-tabs");
  wrap.innerHTML = "";
  categories.forEach(function(cat){
    var b = document.createElement("button");
    b.className = "cat-tab" + (cat.id === currentCategory ? " active" : "");
    b.innerHTML = '<i class="ti ' + cat.icon + '"></i>' + cat.label;
    b.onclick = function(){
      if(spinning) return;
      currentCategory = cat.id;
      renderTabs();
      renderCards();
    };
    wrap.appendChild(b);
  });
}

function bigVisual(it){
  return it.swatch
    ? '<span class="swatch" style="width:48px;height:48px;background:'+it.swatch+';vertical-align:middle;"></span>'
    : '<i class="ti '+it.icon+'" style="font-size:48px;color:#185FA5;vertical-align:middle;"></i>';
}

function renderCards(){
  grid.innerHTML = "";
  cardEls = [];
  filteredIndices = [];
  items.forEach(function(it, idx){
    if(currentCategory !== "all" && it.category !== currentCategory) return;
    filteredIndices.push(idx);
    var used = usedSet.has(idx);
    var b = document.createElement("button");
    b.className = "card" + (used ? " used" : "");
    var visual = it.swatch
      ? '<span class="swatch" style="background:'+it.swatch+';"></span>'
      : '<i class="ti '+it.icon+' card-icon"></i>';
    var badge = used ? '<span class="used-badge"><i class="ti ti-check"></i></span>' : "";
    b.innerHTML = badge + visual + '<span class="card-en">'+it.en+'</span><span class="card-ja">'+it.ja+'</span>';
    b.onclick = function(){ if(!spinning) pick(idx); };
    grid.appendChild(b);
    cardEls.push(b);
  });
  updateProgress();
}

function updateProgress(){
  var total = items.length;
  var done = usedSet.size;
  var pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById("progress-fill").style.width = pct + "%";
  var text = done >= total
    ? "🎉 ぜんぶの カードに ちょうせんしたよ！"
    : done + " / " + total + " まいに ちょうせんずみ";
  document.getElementById("progress-text").textContent = text;
}

function updateStreakUI(){
  document.getElementById("streak").textContent = streak;
  document.getElementById("streak-pill").title = "さいこう記録: " + best + "れんぞく";
}

function highlight(pos, on){
  cardEls[pos].style.background = on ? "#E6F1FB" : "";
  cardEls[pos].style.borderColor = on ? "#378ADD" : "#D3D1C7";
}

function randomPick(){
  if(spinning || filteredIndices.length === 0) return;
  spinning = true;
  document.getElementById("rand-btn").style.opacity = "0.5";
  var total = 18 + Math.floor(Math.random()*filteredIndices.length);
  var step = 0, prev = -1, delay = 55;
  function tick(){
    if(prev >= 0) highlight(prev, false);
    var pos = step % filteredIndices.length;
    highlight(pos, true);
    prev = pos;
    step++;
    if(step <= total){
      if(total - step < 6) delay += 45;
      setTimeout(tick, delay);
    } else {
      setTimeout(function(){
        highlight(prev, false);
        spinning = false;
        document.getElementById("rand-btn").style.opacity = "1";
        pick(filteredIndices[prev]);
      }, 450);
    }
  }
  tick();
}

function show(id){
  ["step1","step2","step3","step4"].forEach(function(s){
    document.getElementById(s).style.display = (s===id) ? "block" : "none";
  });
}

function pick(i){
  current = items[i];
  usedSet.add(i);
  saveState();
  renderCards();
  document.getElementById("chosen1").innerHTML =
    '<div>' + bigVisual(current) + '</div>' +
    '<div class="chosen-en">' + current.en +
      ' <button class="speak-btn" onclick="speakCurrentWord()" aria-label="発音を聞く">🔊</button>' +
    '</div>' +
    '<div class="chosen-ja">' + current.ja + '</div>';
  show("step2");
  speak(current.en);
  syncEvent({ status: "「" + current.en + "」に ちょうせんちゅう", used: usedSet.size, total: items.length });
}

function predict(p){
  myPredict = p;
  document.getElementById("question").innerHTML =
    'Do you like <span class="hl">' + current.en + '</span>?' +
    ' <button class="speak-btn" onclick="speakCurrentQuestion()" aria-label="発音を聞く">🔊</button>';
  document.getElementById("prediction-badge").innerHTML =
    'あなたのよそう: <span style="font-weight:600;">'+(p==="yes" ? "Yes, I do." : "No, I don't.")+'</span>';
  show("step3");
  speak("Do you like " + current.en + "?");
}

function answer(a){
  var hit = (a === myPredict);
  var box = document.getElementById("result-box");
  if(hit){
    score++;
    streak++;
    if(streak > best) best = streak;
    document.getElementById("score").textContent = score;
    updateStreakUI();
    playCorrect();
    box.style.background = "#E1F5EE";
    var streakMsg = streak >= 2
      ? '<div class="streak-msg"><i class="ti ti-flame"></i>' + streak + 'れんぞく せいかい！</div>'
      : '';
    box.innerHTML = '<i class="ti ti-confetti" style="color:#0F6E56;"></i>'
      + '<div class="result-title" style="color:#0F6E56;">あたり!</div>'
      + '<div class="result-sub" style="color:#085041;">よそうが当たったよ +1ポイント</div>'
      + streakMsg;
  } else {
    streak = 0;
    updateStreakUI();
    playWrong();
    box.style.background = "#F1EFE8";
    box.innerHTML = '<i class="ti ti-mood-smile" style="color:#5F5E5A;"></i>'
      + '<div class="result-title" style="color:#2C2C2A;">ざんねん!</div>'
      + '<div class="result-sub" style="color:#5F5E5A;">友だちのこたえは「'+(a==="yes" ? "Yes, I do." : "No, I don't.")+'」でした</div>';
  }
  saveState();
  show("step4");
  syncEvent({
    score: score, streak: streak, best: best, used: usedSet.size, total: items.length,
    status: hit ? "⭕ よそう せいかい！" : "➖ よそう はずれ"
  });
}

function reset(){ current = null; myPredict = null; show("step1"); }

function resetAll(){
  if(!confirm("スコア・れんぞく記録・カードの記録を ぜんぶ 0に もどしますか？")) return;
  score = 0; streak = 0; best = 0; usedSet = new Set();
  document.getElementById("score").textContent = 0;
  updateStreakUI();
  saveState();
  renderCards();
  reset();
  syncEvent({ score: 0, streak: 0, best: 0, used: 0, total: items.length, status: "リセットしました" });
}

/* ---------- init ---------- */
function initGame(){
  loadState();
  renderTabs();
  renderCards();
  updateStreakUI();
  document.getElementById("score").textContent = score;
}

(function boot(){
  var urlRoom = getRoomFromUrl();
  if(urlRoom){
    var badge = document.getElementById("room-badge");
    badge.textContent = "きょうしつコード: " + urlRoom;
    badge.style.display = "inline-block";
  } else {
    document.getElementById("room-row").style.display = "block";
  }
  studentId = localStorage.getItem(STUDENT_ID_KEY);
  if(studentId){
    var photo = localStorage.getItem(STUDENT_PHOTO_KEY);
    if(photo){
      var av = document.getElementById("my-avatar");
      av.src = photo;
      av.style.display = "inline-block";
    }
    document.getElementById("register-overlay").style.display = "none";
    initGame();
  }
})();
</script>
